<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK CHAT - النسخة الأساسية</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root { --bg-main: #0b0b0b; --bg-card: #161616; --bg-input: #222222; --text-color: #e0e0e0; --accent: #ff3366; }
body { background-color: var(--bg-main); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
.login-box { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); border: 1px solid #222; }
#app-screen { display: none; flex-direction: column; height: 100vh; }
header { background: var(--bg-card); padding: 15px; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 1px solid #222; color: var(--accent); }
.mic-section { background: #111; padding: 10px; display: flex; gap: 12px; overflow-x: auto; border-bottom: 1px solid #222; }
.mic-slot { display: flex; flex-direction: column; align-items: center; min-width: 65px; }
.mic-avatar { width: 45px; height: 45px; background: var(--bg-input); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #444; font-size: 20px; }
.mic-avatar.active { border-color: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
.mic-name { font-size: 11px; margin-top: 4px; color: #aaa; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; width: 100%; text-align: center; }
.chat-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
#messages-list { flex-grow: 1; padding: 15px; overflow-y: auto; list-style: none; margin: 0; background: #0d0d0d; }
.msg { margin-bottom: 10px; line-height: 1.5; font-size: 15px; word-break: break-word; }
.msg-sys { color: #777; font-size: 13px; text-align: center; background: rgba(255,255,255,0.02); padding: 4px; border-radius: 4px; }
.input-area { background: var(--bg-card); padding: 10px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #222; }
.controls-row { display: flex; gap: 10px; align-items: center; }
.whisper-select { background: var(--bg-input); color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; font-size: 13px; }
.input-row { display: flex; gap: 8px; }
input[type="text"], select { background: var(--bg-input); border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; font-size: 15px; width: -webkit-fill-available; }
input[type="text"]:focus { border-color: var(--accent); outline: none; }
button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; }
button:hover { background: #e02454; }
</style>
</head>
<body>
<div id="login-screen">
<h1 style="color: var(--accent); margin-bottom: 20px;">DARK CHAT</h1>
<div class="login-box">
<h3 style="margin-top:0; text-align:center;">تسجيل دخول سريع</h3>
<input type="text" id="username" placeholder="ادخل اسمك المستعار..." required><br><br>
<label style="font-size:14px; color:#aaa;">اختر رتبتك:</label><br>
<select id="role" style="margin-top:8px; width:100%;">
<option value="GUEST">زائر (خط أبيض)</option>
<option value="MEMBER">عضو (خط تركواز)</option>
<option value="MODERATOR">مشرف الغرفة (خط أصفر)</option>
<option value="ADMIN">إدمن التطبيق (خط أحمر)</option>
</select><br><br>
<button onclick="enterApplication()" style="width: 100%;">دخول غرف الدردشة</button>
</div>
</div>

<div id="app-screen">
<header id="room-header">غرفة DARK CHAT العامة</header>
<div class="mic-section" id="mic-section"></div>
<div class="chat-container">
<ul id="messages-list"></ul>
<div class="input-area">
<div class="controls-row">
<span style="font-size: 12px; color: #aaa;">إرسال إلى:</span>
<select id="whisper-target" class="whisper-select">
<option value="PUBLIC">الجميع (عام)</option>
</select>
<button id="mic-toggle-btn" onclick="toggleMic()" style="padding: 4px 10px; font-size: 12px; background: #222; border: 1px solid #444;">🎤 اطلب المايك</button>
</div>
<div class="input-row">
<input type="text" id="msg-input" placeholder="اكتب رسالتك هنا..." onkeypress="checkEnter(event)">
<button onclick="sendMessage()">إرسال</button>
</div>
</div>
</div>
</div>

<script>
let socket;
let myData = {};

const micSection = document.getElementById('mic-section');
for(let i=1; i<=8; i++) {
micSection.innerHTML += `
<div class="mic-slot" id="mic-slot-${i}" onclick="takeMicSlot(${i})">
<div class="mic-avatar" id="mic-icon-${i}">🎙️</div>
<div class="mic-name" id="mic-name-${i}">فارغ ${i}</div>
</div>
`;
}

function enterApplication() {
const username = document.getElementById('username').value.trim();
const role = document.getElementById('role').value;
if(!username) {
alert("الرجاء كتابة الاسم المستعار!");
return;
}

// السطر اللي صلحته دارك - كان رابط قديم وخربان
// خليته فاضي عشان يتصل تلقائي بالسيرفر اللي فاتح منه الصفحة
socket = io();

socket.on('connect', () => {
socket.emit('register_user', { username: username, role: role });
});

socket.on('registration_success', (data) => {
myData = data;
document.getElementById('login-screen').style.display = 'none';
document.getElementById('app-screen').style.display = 'flex';
document.getElementById('room-header').innerText = `DARK CHAT - الغرفة العامة (${data.username})`;
});

socket.on('sys_broadcast', (data) => {
appendMessage(data.text, true);
});

socket.on('receive_chat_msg', (data) => {
appendMessage(data);
});
}

function appendMessage(data, isSys = false) {
const list = document.getElementById('messages-list');
const li = document.createElement('li');
if(isSys) {
li.className = 'msg msg-sys';
li.innerText = data;
} else {
li.className = 'msg';
li.innerHTML = `<strong style="color: ${data.color}">[${data.roleName}] ${data.username}:</strong> <span>${data.text}</span>`;
}
list.appendChild(li);
list.scrollTop = list.scrollHeight;
}

function sendMessage() {
const input = document.getElementById('msg-input');
const text = input.value.trim();
if(!text || !socket) return;
socket.emit('send_chat_msg', text);
input.value = '';
}

function checkEnter(event) {
if(event.key === 'Enter') {
sendMessage();
}
}

function toggleMic() {
alert('نظام المايكات الصوتية قيد البرمجة دارك 🔥');
}

function takeMicSlot(slot) {
alert('رح نبرمج المايكات بعد ما نتأكد الشات الكتابي شغال');
}
</script>
</body>
</html>
