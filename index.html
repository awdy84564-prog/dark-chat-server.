      <h3 style="margin-top:0; text-align:center;">تسجيل دخول سريع</h3>
      <input type="text" id="username" placeholder="ادخل الاسم المستعار..." required><br><br>
      <input type="password" id="password" placeholder="كلمة المرور للرتبة (اتركه فارغاً للزوار)..."><br><br>
      <button onclick="enterApplication()" style="width: 100%;">دخول الشات</button>
    </div>
  </div>

  <div id="app-screen">
    <header>
      <span id="room-header">غرفة LUGANA العامة</span>
      <div>
        <button class="header-btn" onclick="openRoomModal()">➕ انشاء غرفة</button>
        <button class="header-btn" onclick="openSettingsModal()">⚙️ الإعدادات</button>
      </div>
    </header>

    <div class="rooms-bar" id="rooms-bar"></div>

    <div class="mics-container">
      <div class="mic-row" id="mic-row-top"></div>
      <div class="mic-row" id="mic-row-bottom"></div>
    </div>

    <div class="chat-container">
      <ul id="messages-list"></ul>
      <div class="input-area">
        <div class="controls-row">
          <button class="leave-mic-btn" id="leave-mic-btn" onclick="leaveMic()">📉 انزل من المايك</button>
        </div>
        <div class="input-row">
          <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا..." onkeypress="checkEnter(event)">
          <button onclick="sendMessage()" style="padding: 12px;">إرسال</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let socket;
    let myData = {};
    let selectedUserIdForAdmin = null;
    let selectedSlotIdForAdmin = null;
    let pendingRoomName = 'الغرفة العامة';

    let localStream = null;
    let peerConnections = {};
    const rtcConfig = { iceServers: [{ urls: 'stun:://google.com' }] };

    const rowTop = document.getElementById('mic-row-top');
    const rowBottom = document.getElementById('mic-row-bottom');

    for(let i = 0; i < 8; i++) {
        const targetRow = i < 4 ? rowTop : rowBottom;
        targetRow.innerHTML += `
            <div class="mic-slot" id="mic-slot-${i}" onclick="handleMicClick(${i})">
                <div class="mic-avatar" id="mic-icon-${i}">🎙️</div>
                <div class="mic-name" id="mic-name-${i}">فارغ ${i+1}</div>
            </div>
        `;
    }

    function enterApplication() {
        const uname = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if(!uname) { alert("الرجاء كتابة الاسم المستعار!"); return; }

        socket = io();
        setupSocketEvents();

        socket.on('connect', () => {
            socket.emit('join_room', { username: uname, password: pass, roomName: 'الغرفة العامة' });
        });
    }

    function setupSocketEvents() {
        socket.on('room_state', (state) => {
            myData = state.myData;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('room-login-modal').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('room-header').innerText = `غرفة: ${state.roomName} (${myData.username})`;
            
            document.getElementById('settings-role').innerText = myData.role;
            document.getElementById('settings-room').innerText = state.roomName;

            updateMicsUI(state.mics);
            updateRoomsBar(state.allRooms, state.roomName);
            
            document.getElementById('messages-list').innerHTML = '';
            appendMessage(`✅ مرحباً بك في ${state.roomName}`, true);
        });

        socket.on('update_mics', (mics) => { updateMicsUI(mics); });
        socket.on('update_rooms_list', (allRooms) => { updateRoomsBar(allRooms, document.getElementById('settings-room').innerText); });
        socket.on('login_error', (msg) => { alert(msg); });
        
        socket.on('sys_broadcast', (data) => { appendMessage(data.text, true); });
        socket.on('new_message', (data) => { appendMessage(data); });

        socket.on('force_disconnect', (msg) => { alert(msg); window.location.reload(); });
        
        socket.on('role_changed', (data) => {
            myData.role = data.newRole;
            document.getElementById('settings-role').innerText = data.newRole;
        });

        // ================= تداول الصوت الحقيقي WebRTC Signaling =================
        socket.on('mic_stream_started', async (data) => {
            if (data.broadcasterId === socket.id) return;
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[data.broadcasterId] = pc;

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice_candidate', { targetId: data.broadcasterId, candidate: e.candidate });
            };

            pc.ontrack = (e) => {
                let audioEl = document.getElementById(`audio-${data.broadcasterId}`);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = `audio-${data.broadcasterId}`;
                    audioEl.autoplay = true;
                    document.getElementById('audio-players-container').appendChild(audioEl);
                }
                audioEl.srcObject = e.streams[0];
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('audio_offer', { targetId: data.broadcasterId, sdp: pc.localDescription });
        });

        socket.on('audio_offer', async (data) => {
            const pc = peerConnections[data.senderId] || new RTCPeerConnection(rtcConfig);
            peerConnections[data.senderId] = pc;

            if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice_candidate', { targetId: data.senderId, candidate: e.candidate });
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('audio_answer', { targetId: data.senderId, sdp: pc.localDescription });
        });

        socket.on('audio_answer', async (data) => {
            const pc = peerConnections[data.senderId];
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        });

        socket.on('ice_candidate', async (data) => {
            const pc = peerConnections[data.senderId];
            if (pc) await pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.error(e));
        });

        socket.on('mic_stream_stopped', (data) => { closePeerConnection(data.broadcasterId); });
    }

    function updateMicsUI(mics) {
        let amIOnMic = false;
        mics.forEach((slot, index) => {
            const iconEl = document.getElementById(`mic-icon-${index}`);
            const nameEl = document.getElementById(`mic-name-${index}`);
            if (slot.isLocked) {
                iconEl.innerText = "🔒"; iconEl.className = "mic-avatar locked"; nameEl.innerText = `مغلق ${index + 1}`;
            } else if (slot.userId) {
                iconEl.innerText = "🗣️"; iconEl.className = "mic-avatar active"; nameEl.innerText = slot.username;
                if (slot.userId === socket.id) amIOnMic = true;
            } else {
                iconEl.innerText = "🎙️"; iconEl.className = "mic-avatar"; nameEl.innerText = `فارغ ${index + 1}`;
            }
        });
        document.getElementById('leave-mic-btn').style.display = amIOnMic ? 'block' : 'none';
    }

    function updateRoomsBar(allRooms, activeRoom) {
        const bar = document.getElementById('rooms-bar');
        bar.innerHTML = '';
        allRooms.forEach(r => {
            const activeClass = r === activeRoom ? 'active' : '';
            bar.innerHTML += `<div class="room-btn ${activeClass}" onclick="switchRoomRequest('${r}')">🚪 ${r}</div>`;
        });
    }

    function switchRoomRequest(roomName) {
        if(roomName === document.getElementById('settings-room').innerText) return;
        pendingRoomName = roomName;
        document.getElementById('room-login-name').innerText = roomName;
        document.getElementById('room-username').value = myData.username;
        document.getElementById('room-password').value = '';
        document.getElementById('room-login-modal').style.display = 'flex';
    }

    function confirmRoomLogin() {
        const uname = document.getElementById('room-username').value.trim();
        const pass = document.getElementById('room-password').value.trim();
        if(!uname) return;
        leaveMic();
        socket.emit('join_room', { username: uname, password: pass, roomName: pendingRoomName });
    }

    function appendMessage(data, isSys = false) {
        const list = document.getElementById('messages-list');
        const li = document.createElement('li');
        if(isSys) {
            li.className = 'msg msg-sys'; li.innerText = data;
        } else {
            li.className = 'msg';
            const founderClass = data.role === 'المؤسس' ? 'role-founder' : '';
            li.innerHTML = `<strong class="username-clickable ${founderClass}" style="color: ${data.color}" onclick="openAdminMenu(event, '${data.id}')">[${data.roleName}] ${data.username}:</strong> <span>${data.text}</span>`;
        }
        list.appendChild(li);
        list.scrollTop = list.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !socket) return;
        socket.emit('send_message', text);
        input.value = '';
    }

    function checkEnter(event) { if(event.key === 'Enter') sendMessage(); }

    async function handleMicClick(slotId) {
        if(!socket) return;
        selectedSlotIdForAdmin = slotId;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            socket.emit('request_mic', slotId);
        } catch (err) {
            alert("❌ يرجى منح صلاحية المايكروفون للبث!");
        }
    }

    function leaveMic() {
        if (socket) socket.emit('leave_mic');
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        Object.keys(peerConnections).forEach(key => closePeerConnection(key));
    }

    function closePeerConnection(id) {
        if (peerConnections[id]) { peerConnections[id].close(); delete peerConnections[id]; }
        const audioEl = document.getElementById(`audio-${id}`); if (audioEl) audioEl.remove();
    }

    function openAdminMenu(event, targetId) {
        event.preventDefault();
        if(targetId === socket.id || !socket) return;
        selectedUserIdForAdmin = targetId;
        const menu = document.getElementById('admin-context-menu');
        menu.style.display = 'flex'; menu.style.top = `${event.clientY}px`; menu.style.left = `${event.clientX}px`;
    }

    function closeAdminMenu() { document.getElementById('admin-context-menu').style.display = 'none'; }

    function executeAdminAction(action) {
        if (!socket) return;
        if (action === 'lock_mic' && selectedSlotIdForAdmin !== null) {
            socket.emit('admin_toggle_mic_lock', selectedSlotIdForAdmin);
        } else if (selectedUserIdForAdmin) {
            socket.emit('admin_action', { action: action, targetId: selectedUserIdForAdmin });
        }
        closeAdminMenu();
    }

    function openRoleModal() {
        document.getElementById('role-modal').style.display = 'flex';
        closeAdminMenu();
    }
    function closeRoleModal() { document.getElementById('role-modal').style.display = 'none'; }
    function confirmSetRole() {
        const newRole = document.getElementById('role-select').value;
        socket.emit('admin_action', { action: 'set_role', targetId: selectedUserIdForAdmin, newRole: newRole });
        closeRoleModal();
    }

    function openRoomModal() { document.getElementById('room-modal').style.display = 'flex'; }
    function closeRoomModal() { document.getElementById('room-modal').style.display = 'none'; }
    function confirmCreateRoom() {
        const rName = document.getElementById('new-room-name').value.trim();
        if(rName) socket.emit('create_room', rName);
        closeRoomModal();
    }

    function openSettingsModal() { document.getElementById('settings-modal').style.display = 'flex'; }
    function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; }
    function closeRoomLoginModal() { document.getElementById('room-login-modal').style.display = 'none'; }

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('admin-context-menu');
        if (!menu.contains(e.target) && e.target.className.indexOf('username-clickable') === -1) closeAdminMenu();
    });
  </script>
</body>
</html>
